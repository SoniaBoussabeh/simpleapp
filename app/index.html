<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple App</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main class="card">
    <!-- CHANGE ME: headline -->
    <h1>Hello from Simple App 👋</h1>

    <!-- CHANGE ME: body text -->
    <p>
      This page is served by nginx from a container running in Kubernetes,
      in the <code>simple-app</code> namespace.
    </p>

    <!-- CHANGE ME: add/remove items here across commits -->
    <h2>What's new</h2>
    <ul id="notes">
      <li>Initial release.</li>
    </ul>

    <p class="version">
      Version: <span id="version">loading…</span>
    </p>
  </main>

  <script>
    fetch('/version')
      .then(function (r) { return r.text(); })
      .then(function (v) { document.getElementById('version').textContent = v.trim(); })
      .catch(function () { document.getElementById('version').textContent = 'unknown'; });
  </script>
</body>
</html>
