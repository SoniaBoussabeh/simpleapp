server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # Version page: returns the contents of version.txt as plain text
    location = /version {
        default_type text/plain;
        alias /usr/share/nginx/html/version.txt;
    }

    # Health endpoint for Kubernetes probes
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }
}
